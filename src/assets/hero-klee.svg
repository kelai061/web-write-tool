<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Warm red gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <!-- Gold gradient for accents -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Stem -->
    <path d="M 100 110 Q 95 160 70 175" fill="none" stroke="url(#leafGrad)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Leaves -->
    <g transform="translate(100, 100)">
      <!-- Leaf 1 (Top) -->
      <g transform="rotate(0)">
        <path d="M 0 0 C -25 -40, -45 -30, -35 5 C -25 35, 0 10, 0 0" fill="url(#leafGrad)"/>
        <path d="M 0 0 C 25 -40, 45 -30, 35 5 C 25 35, 0 10, 0 0" fill="url(#leafGrad)"/>
      </g>
      <!-- Leaf 2 (Right) -->
      <g transform="rotate(90)">
        <path d="M 0 0 C -25 -40, -45 -30, -35 5 C -25 35, 0 10, 0 0" fill="url(#leafGrad)"/>
        <path d="M 0 0 C 25 -40, 45 -30, 35 5 C 25 35, 0 10, 0 0" fill="url(#leafGrad)"/>
      </g>
      <!-- Leaf 3 (Bottom) -->
      <g transform="rotate(180)">
        <path d="M 0 0 C -25 -40, -45 -30, -35 5 C -25 35, 0 10, 0 0" fill="url(#leafGrad)"/>
        <path d="M 0 0 C 25 -40, 45 -30, 35 5 C 25 35, 0 10, 0 0" fill="url(#leafGrad)"/>
      </g>
      <!-- Leaf 4 (Left) -->
      <g transform="rotate(270)">
        <path d="M 0 0 C -25 -40, -45 -30, -35 5 C -25 35, 0 10, 0 0" fill="url(#leafGrad)"/>
        <path d="M 0 0 C 25 -40, 45 -30, 35 5 C 25 35, 0 10, 0 0" fill="url(#leafGrad)"/>
      </g>
      
      <!-- Central Gold Sparkle/Diamond -->
      <path d="M 0 -12 L 10 0 L 0 12 L -10 0 Z" fill="url(#goldGrad)"/>
      <circle cx="0" cy="0" r="4" fill="#ffffff"/>
    </g>
  </g>
</svg>
